#:schema https://github.com/joshmedeski/sesh/raw/main/sesh.schema.json

blacklist = ["scratch"]

cache = true

dir_length = 2 # Uses last 2 directories: "projects/sesh" instead of just "sesh"

[default_session]
# startup_command = "nvim -c ':Telescope find_files'"
preview_command = "eza --all --git --icons --color=always {}"

[[session]]
name = "config-sesh"
path = "~/dotfiles/sesh/.config/sesh"
startup_command = "nvim sesh.toml"
preview_command = "bat --color=always ~/dotfiles/sesh/.config/sesh/sesh.toml"


[[session]]
name = "config-neovim"
path = "~/dotfiles/nvim/.config/nvim"
startup_command = "nvim"

[[session]]
name = "config-tmux"
path = "~/dotfiles/tmux/.config/tmux"
startup_command = "nvim tmux.conf"
preview_command = "bat --color=always ~/dotfiles/tmux/.config/tmux/tmux.conf"

[[session]]
name = "config-kitty"
path = "~/dotfiles/kitty/.config/kitty"
startup_command = "nvim kitty.conf"
preview_command = "bat --color=always -l conf ~/.config/kitty/kitty.conf"

[[session]]
name = "config-zsh"
path = "~/dotfiles/zsh/.config/zsh"
startup_command = "nvim last.aliases.zsh"
preview_command = "bat --color=always ~/dotfiles/zsh/.config/zsh/last.aliases.zsh"

[[session]]
name = "config-niri"
path = "~/dotfiles/niri/.config/niri"
startup_command = "nvim config.kdl"
preview_command = "bat --color=always ~/dotfiles/niri/.config/niri/config.kdl"


[[session]]
name = "config-niri"
path = "~/dotfiles/niri/.config/niri"
startup_command = "nvim config.kdl"
preview_command = "bat --color=always ~/dotfiles/niri/.config/niri/config.kdl"

[[session]]
name = "config-qutebrowser"
path = "~/dotfiles/apps/.config/qutebrowser"
startup_command = "nvim config.py"
preview_command = "bat --color=always ~/dotfiles/apps/.config/qutebrowser/config.py"

[[session]]
name = "config-yazi"
path = "~/dotfiles/apps/.config/yazi"
startup_command = "nvim yazi.toml"
preview_command = "bat --color=always ~/dotfiles/apps/.config/yazi/yazi.toml"

[[session]]
name = "config-superfile"
path = "~/dotfiles/apps/.config/superfile"
startup_command = "nvim config.toml"
preview_command = "bat --color=always ~/dotfiles/apps/.config/superfile/config.toml"

[[session]]
name = "config-mpv"
path = "~/dotfiles/apps/.config/mpv"
startup_command = "nvim mpv.conf"
preview_command = "bat --color=always ~/dotfiles/apps/.config/mpv/mpv.conf"

[[session]]
name = "config-gitconf"
path = "~/dotfiles/gitconf"
startup_command = "nvim .gitconfig"
preview_command = "bat --color=always ~/dotfiles/gitconf/.gitconfig"

[[session]]
name = "rebos-gen"
path = "~/dotfiles/rebos/.config/rebos"
startup_command = "nvim gen.toml"
preview_command = "bat --color=always ~/dotfiles/rebos/.config/rebos/gen.toml"

[[session]]
name = "rebos-work"
path = "~/dotfiles/rebos/.config/rebos"
startup_command = "nvim imports/work_pkgs.toml"
preview_command = "bat --color=always ~/dotfiles/rebos/.config/rebos/imports/work_pkgs.toml"

[[session]]
name = "config-moxide"
path = "~/dotfiles/moxide/.config/moxide"
startup_command = "nvim settings.toml"
preview_command = "bat --color=always ~/dotfiles/moxide/.config/moxide/settings.toml"

[[session]]
name = "project-devcore"
path = "/mnt/storage/workspace/projects/devcore"
startup_command = "nvim package.json"
preview_command = "bat --color=always /mnt/storage/workspace/projects/devcore/package.json"

[[session]]
name = "personal-ledger"
path = "/mnt/storage/personal/ledgers"
startup_command="nvim $(date +%Y).beancount"
preview_command = 'bat --color=always /mnt/storage/personal/ledgers/"$(date +%Y)".beancount'


[[session]]
name = "personal-idealogs"
path = "/mnt/storage/personal/idealogs"
startup_command="nvim"
preview_command = 'bat --color=always /mnt/storage/personal/idealogs/package.json'


