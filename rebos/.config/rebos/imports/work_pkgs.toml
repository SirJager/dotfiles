[managers.packages]
items = [
  "go",                     # Golang
  "sqlit",                  # A user friendly TUI for SQL databases.
  "github-cli",             # Github cli
  "migrate",                # Migrate package for database migration with sql files
  "fnm",                    # Fast and simple node version manaager
  "serpl",                  # Search and Replace through terminal
  "docker",                 # Containerization platform
  "docker-compose",         # Tool for defining and running multi-container Docker apps
  "gpu-screen-recorder",    # Screen Recording 
  "slurp",                  # Region Selection: for region recording
  "qutebrowser",            # Keyboard driven minial sleep browser
  "docker-buildx",          # Buildx plugin for docker 
  "luajit-tiktoken-bin",    # binding of rust tiktoken to lua
  "markdown-oxide",         # Markdown-Oxide is a Personal Knowledge Management System
  "presenterm",             # presenterm lets you create presentations in markdown format and run them from your terminal
  "mermaid-cli",            # required by presenterm to show mermaid diagrams
  "postman-bin",            # Postman is an HTTP client used to build, test, and modify APIs.
  'visual-studio-code-bin', # Visual studio code
  "sesh-bin",               # Sesh is a CLI that helps you create and manage tmux sessions quickly and easily using zoxide.
  "television",             # Television is a fast, portable and hackable fuzzy finder for the terminal.
  "winboat-bin",            # Run Windows apps on Linux with seamless integration
  "beancount",              # Double-Entry Accounting from Text Files
  "hledger",                # hledger is for tracking money, investments, cryptocurrencies, time, or any countable commodity
  "hledger-ui",             # hledger ui
  "hledger-web",            # hledger web ui
  "glow",                   # Glow is a terminal based markdown reader
  "zathura",                # PDF viewer
  "zathura-cb",             # zathura comic support
  "zathura-djvu",           # zathura djvu support
  "zathura-epub-mupdf",     # zathura epub and mupdf support
  # "kdenlive-git",           # A non-linear video editor for Linux using the MLT video framework. KF5 Frameworks (Latest Applications GIT Version)
  # "opencode-bin",           # The open source AI coding agent.
]

[managers.cargo]
items = [
  "wiki-tui", # A simple and easy to use Wikipedia Text User Interface
]


[managers.node_pkgs]
items = [
  "nx",                   # Nx is a build system for monorepos. It helps you develop faster and keep CI fast as your codebase scales.
  "turbo",                # Turborepo is the build system for JavaScript and TypeScript codebases
  "zsh-pnpm-completions", # Smart pnpm completions for Z-shell with live npm search and workspace support
]


[managers.python_pkgs]
items = [
  "fava",       # Fava is a web interface for the double-entry bookkeeping software Beancount
  "posting",    # Posting is a beautiful terminal app for developing & testing APIs
  "markitdown", # Python utility for converting various files to Markdown
]


[managers.serv_start]
items = [
  "docker", # Start Docker daemon at login
]
