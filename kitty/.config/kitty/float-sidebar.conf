# Kitty configuration for a floating quick-access terminal
# Designed to display Niri keybindings using fzf
# Window size: 22 lines × 75 columns
# Window position: centered and slightly smaller than full screen (edge center-sized)
# Background: semi-transparent with 85% opacity

columns 45
edge right
background_opacity 0.9
hide_window_decorations yes

font_family       JetbrainsMono Nerd Font
font_size         10
italic_font       auto
bold_font         auto
bold_italic_font  auto
window_padding_width 0
disable_ligatures never


